name: Deploy MCP Server

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deployment environment'
        required: true
        default: 'staging'
        type: choice
        options:
        - staging
        - production
  push:
    branches:
      - main
    paths:
      - 'mcp_server.py'
      - 'requirements.txt'
      - 'Dockerfile'

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment || 'staging' }}
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3
    
    - name: Build and tag image
      run: |
        docker build -t ghidra-mcp-server:latest .
        docker tag ghidra-mcp-server:latest ghidra-mcp-server:${{ github.sha }}
    
    - name: Export Docker image
      run: |
        docker save ghidra-mcp-server:latest | gzip > ghidra-mcp-server-latest.tar.gz
    
    - name: Upload deployment artifact
      uses: actions/upload-artifact@v4
      with:
        name: ghidra-mcp-server-deployment-${{ github.sha }}
        path: ghidra-mcp-server-latest.tar.gz
        retention-days: 30
    
    - name: Create deployment summary
      run: |
        echo "## Deployment Summary" >> $GITHUB_STEP_SUMMARY
        echo "- **Environment**: ${{ github.event.inputs.environment || 'staging' }}" >> $GITHUB_STEP_SUMMARY
        echo "- **Commit**: ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
        echo "- **Image**: ghidra-mcp-server:${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
        echo "- **Artifact**: ghidra-mcp-server-deployment-${{ github.sha }}" >> $GITHUB_STEP_SUMMARY