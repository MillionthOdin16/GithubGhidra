name: Build and Test MCP Server

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
    
    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
    
    - name: Lint Python code
      run: |
        pip install flake8 black isort
        flake8 mcp_server.py --max-line-length=100
        black --check mcp_server.py
        isort --check-only mcp_server.py
    
    - name: Test MCP server syntax
      run: |
        python -m py_compile mcp_server.py
        python -c "import mcp_server"

  build-docker:
    runs-on: ubuntu-latest
    needs: test
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3
    
    - name: Build Docker image
      run: |
        docker build -t ghidra-mcp-server .
    
    - name: Test Docker image
      run: |
        docker run --rm ghidra-mcp-server python3 -c "import mcp_server; print('MCP server imported successfully')"
    
    - name: Save Docker image
      if: github.ref == 'refs/heads/main'
      run: |
        docker save ghidra-mcp-server | gzip > ghidra-mcp-server.tar.gz
    
    - name: Upload Docker image artifact
      if: github.ref == 'refs/heads/main'
      uses: actions/upload-artifact@v4
      with:
        name: ghidra-mcp-server-image
        path: ghidra-mcp-server.tar.gz
        retention-days: 7